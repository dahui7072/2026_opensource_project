<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 스마트 킥보드 위반 관제 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="main-header">
        <h1>🛴 AI 스마트 모빌리티 위반 관제 시스템</h1>
        <div class="system-status">
            <span class="status-indicator"></span> SYSTEM ONLINE
        </div>
    </header>

    <div class="dashboard-container">
        <div class="top-section">
            <div class="card video-card">
                <div class="card-header">
                    <h2>실시간 감지 피드</h2>
                    <span class="live-badge">● LIVE</span>
                </div>
                <div class="video-wrapper">
                    <img src="/video_feed" alt="CCTV Stream">
                </div>
            </div>

            <div class="stats-panel">
                <div class="kpi-card total">
                    <h3>오늘 총 위반 건수</h3>
                    <p id="statTotalCount">0</p>
                </div>
                <div class="kpi-card helmet">
                    <h3>헬멧 미착용 수</h3>
                    <p id="statHelmetCount">0</p>
                </div>
                <div class="kpi-card two-person">
                    <h3>2인 탑승 수</h3>
                    <p id="statTwoPersonCount">0</p>
                </div>
                <div class="kpi-card accuracy">
                    <h3>AI 감지 정확도</h3>
                    <p id="statAccuracy">-</p>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="card chart-card">
                <div class="card-header"><h2>시간대별 위반 건수</h2></div>
                <div class="chart-wrapper">
                    <canvas id="hourlyChart"></canvas>
                </div>
            </div>

            <div class="card chart-card">
                <div class="card-header"><h2>위반 유형 비율</h2></div>
                <div class="chart-wrapper pie-wrapper">
                    <canvas id="ratioChart"></canvas>
                </div>
            </div>

            <div class="card log-card">
                <div class="card-header"><h2>누적 위반 기록 (실시간 CSV)</h2></div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>단속 시간</th>
                                <th>위반 유형</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/chart.js"></script>
</body>
</html>
